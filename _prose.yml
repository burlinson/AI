prose:
  # Only allow editing inside the _posts folder
  rooturl: "_posts"

  # Do NOT let Prose rewrite metadata files or rename posts
  metadata_file: false

  metadata:
    _posts:
      # Title is optional — you can hide it if you want
      - name: "title"
        field:
          element: "text"

      # LOCKED FIELDS — Prose cannot touch these
      - name: "date"
        field:
          element: "hidden"
      - name: "author"
        field:
          element: "hidden"
      - name: "layout"
        field:
          element: "hidden"
      - name: "permalink"
        field:
          element: "hidden"
      - name: "categories"
        field:
          element: "hidden"
      - name: "tags"
        field:
          element: "hidden"

      # LOCK DOWN Beautiful Jekyll custom fields
      - name: "subtitle"
        field:
          element: "hidden"
      - name: "summary"
        field:
          element: "hidden"
      - name: "cover-img"
        field:
          element: "hidden"
      - name: "thumbnail-img"
        field:
          element: "hidden"

  # Hide everything outside _posts so you can't break anything
  ignore:
    - "index.html"
    - "_config.yml"
    - "_includes"
    - "_layouts"
    - "_site"
    - "assets"
    - "scripts"
    - "Gemfile"
    - "Gemfile.lock"

